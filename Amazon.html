<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Ecommerce</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f1f3f6;}

.navbar{background:#131921;}
.logo{color:white;font-size:22px;font-weight:bold;}

.product-card{
border-radius:12px;
transition:0.3s;
}
.product-card:hover{transform:scale(1.05);}

.product-img{
height:180px;
width:100%;
object-fit:cover;
border-radius:10px;
}

.btn-small{
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container-fluid">

<span class="logo">E-Commerce</span>

<input id="search" class="form-control w-50" placeholder="Search..." onkeyup="searchProduct()">

<div>
<button class="btn btn-light btn-sm" onclick="filterAll()">All</button>
<button class="btn btn-light btn-sm" onclick="filterCategory('Mobile')">Mobile</button>
<button class="btn btn-light btn-sm" onclick="filterCategory('Laptop')">Laptop</button>
<button class="btn btn-light btn-sm" onclick="filterCategory('Camera')">Camera</button>

<button class="btn btn-warning ms-2" data-bs-toggle="modal" data-bs-target="#cartModal">
🛒 (<span id="count">0</span>)
</button>
</div>

</div>
</nav>

<!-- PRODUCTS -->
<div class="container mt-4">
<div class="row" id="list"></div>
</div>

<!-- CART -->
<div class="modal fade" id="cartModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Cart</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="cartItems"></div>

<div class="modal-footer">
<h5>Total: ₹<span id="total">0</span></h5>
</div>

</div>
</div>
</div>

img:"https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&w=600&q=80"}

];

let cart = [];
let wishlist = [];

// 📦 DISPLAY PRODUCTS
function show(list=products){
let html="";
list.forEach(p=>{
html+=`
<div class="col-md-3 mb-3">
<div class="card product-card p-2 text-center">
<img src="${p.img}" class="product-img">

<h6>${p.name}</h6>
<p>${p.category}</p>
<b>₹${p.price}</b>

<button class="btn btn-primary btn-small w-100" onclick="add(${p.id})">🛒 Add</button>
<button class="btn btn-danger btn-small w-100" onclick="addWish(${p.id})">❤️ Wishlist</button>

</div>
</div>`;
});
document.getElementById("list").innerHTML = html;
}

// 🛒 ADD CART
function add(id){
let item = products.find(p=>p.id===id);
cart.push(item);
updateCart();
}

// ❌ REMOVE
function remove(i){
cart.splice(i,1);
updateCart();
}

// ❤️ WISHLIST
function addWish(id){
let item = products.find(p=>p.id===id);
wishlist.push(item);
alert("Added to wishlist ❤️");
}

// 🧺 CART UPDATE
function updateCart(){
document.getElementById("count").innerText = cart.length;

let html="";
let total=0;

cart.forEach((c,i)=>{
total += c.price;
html+=`
<div class="d-flex justify-content-between border p-2 mb-2">
<div>
<b>${c.name}</b><br>
₹${c.price}
</div>
<button class="btn btn-sm btn-danger" onclick="remove(${i})">X</button>
</div>`;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;
}

// 🔍 SEARCH
function searchProduct(){
let val=document.getElementById("search").value.toLowerCase();
let filtered = products.filter(p =>
p.name.toLowerCase().includes(val)
);
show(filtered);
}

// 🔥 FILTER
function filterCategory(cat){
let filtered = products.filter(p=>p.category===cat);
show(filtered);
}

function filterAll(){
show(products);
}

show();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
